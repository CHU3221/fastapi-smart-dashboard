<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard Settings</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; width: 300px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #00ff88; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc6a; }
    </style>
</head>
<body>
    <h2>대시보드 설정</h2>
    <label>대시보드 접속 주소 (포트 포함)</label>
    <input type="text" id="dashboardUrl" placeholder="예: 192.168.0.200:7600">
    <button id="saveBtn">저장하기</button>
    <div id="status" style="margin-top: 10px; color: #00ff88; font-size: 0.9em;"></div>
    
    <script src="options.js"></script>
</body>
</html>
